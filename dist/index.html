      // PWA Install prompt

        banner.id = 'pwa-banner';
        banner.style.cssText = [

          'width:calc(100% - 32px)', 'font-family:Inter,sans-serif', 'animation:slideUp .3s ease'
        ].join(';');

          + '<button id="pwa-dismiss" style="padding:4px 14px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:none;color:rgba(255,255,255,0.4);font-family:Inter,sans-serif">Nu acum</button>'
          + '</div>';
        document.body.appendChild(banner);

        document.getElementById('pwa-install').onclick = function() {
